<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>پلنر شخصی</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c11">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="پلنر">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#0a0c11;
    --bg-2:#0d1017;
    --surface:#12151d;
    --surface-2:#1a1e29;
    --surface-3:#232838;
    --border:#252b3a;
    --text:#eceef3;
    --text-dim:#8991a6;
    --text-dimmer:#5d6579;
    --accent:#f2b84b;
    --accent-dim:#7a6229;
    --good:#3ecf9b;
    --good-dim:#1c4a3c;
    --bad:#f0605a;
    --bad-dim:#4a2321;
    --ring-track:#1c2029;
    --radius-lg:22px;
    --radius-md:16px;
    --radius-sm:10px;
    --shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(242,184,75,.07), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(62,207,155,.06), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Vazirmatn', system-ui, sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--accent); color:#1a1206; }
  button{ font-family:inherit; cursor:pointer; }
  input, textarea{ font-family:inherit; }
  .app{
    max-width:760px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:96px;
  }

  /* ---------- Header ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px 14px;
    background:linear-gradient(180deg, var(--bg) 60%, transparent);
    backdrop-filter:blur(6px);
  }
  .brand-title{
    font-size:13px; letter-spacing:.5px; color:var(--text-dimmer); font-weight:600;
  }
  .brand-date{
    font-size:22px; font-weight:800; margin-top:2px;
  }
  .brand-date b{ color:var(--accent); font-weight:900; }
  .icon-btn{
    width:40px; height:40px; border-radius:50%;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    display:flex; align-items:center; justify-content:center; font-size:16px;
    transition:.15s;
  }
  .icon-btn:hover{ background:var(--surface-3); color:var(--text); }
  .app.hidden{ display:none; }

  /* ---------- Auth screen ---------- */
  .auth-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .auth-screen.hidden{ display:none; }
  .auth-box{
    width:100%; max-width:340px; display:flex; flex-direction:column; gap:10px;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:28px 22px; box-shadow:var(--shadow);
  }
  .auth-sub{ color:var(--text-dim); font-size:13px; margin-bottom:10px; }
  .auth-box input{
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    border-radius:var(--radius-sm); padding:12px 14px; font-size:14px; text-align:right;
    direction:ltr; text-align:left;
  }
  .auth-box input:focus{ outline:none; border-color:var(--accent); }
  .auth-error{ color:var(--bad); font-size:12.5px; min-height:16px; }
  .auth-btn{
    border:none; border-radius:var(--radius-sm); padding:12px; font-size:14px; font-weight:700;
    background:var(--surface-2); color:var(--text); margin-top:2px; transition:.15s;
  }
  .auth-btn:hover{ background:var(--surface-3); }
  .auth-btn.primary{ background:var(--accent); color:#1a1206; }
  .auth-btn.primary:hover{ filter:brightness(1.05); }
  .auth-btn:disabled{ opacity:.6; cursor:default; }

  main{ flex:1; padding:6px 16px 20px; }
  .tab-panel{ display:none; animation:fadeIn .25s ease; }
  .tab-panel.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  /* ---------- Cards / generic ---------- */
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:18px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
  }
  .card h3{ margin:0 0 12px; font-size:15px; font-weight:700; color:var(--text); }
  .row-between{ display:flex; align-items:center; justify-content:space-between; }
  .muted{ color:var(--text-dim); font-size:13px; }
  .dimmer{ color:var(--text-dimmer); font-size:12px; }
  .pill{
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:999px; font-size:11.5px; font-weight:700;
  }
  .pill.good{ background:var(--good-dim); color:var(--good); }
  .pill.bad{ background:var(--bad-dim); color:var(--bad); }
  .pill.accent{ background:var(--accent-dim); color:var(--accent); }
  .pill.neutral{ background:var(--surface-3); color:var(--text-dim); }

  /* ---------- Nav (date/week/month switcher) ---------- */
  .nav-switch{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .nav-switch .mid{ text-align:center; }
  .nav-switch .mid .big{ font-weight:800; font-size:16px; }
  .nav-switch .mid .small{ font-size:12px; color:var(--text-dim); }
  .chev{
    width:38px; height:38px; border-radius:50%;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .chev:active{ transform:scale(.92); }
  .today-jump{
    font-size:11px; color:var(--accent); background:none; border:none; padding:2px 0 0;
  }

  /* ---------- Ring ---------- */
  .ring-wrap{ display:flex; align-items:center; gap:20px; }
  .ring-svg-box{ position:relative; width:110px; height:110px; flex:none; }
  .ring-svg-box svg{ transform:rotate(-90deg); }
  .ring-center{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:19px; font-weight:900; color:var(--text);
  }
  .ring-num{ font-size:20px; font-weight:800; }
  .ring-label{ font-size:12.5px; color:var(--text-dim); margin-top:4px; }
  .ring-stats{ display:flex; flex-direction:column; gap:2px; }

  /* ---------- Task / habit row ---------- */
  .task-row{
    display:flex; align-items:center; gap:12px;
    padding:12px 4px; border-bottom:1px solid var(--border);
  }
  .task-row:last-child{ border-bottom:none; }
  .check{
    width:26px; height:26px; min-width:26px; border-radius:9px;
    border:2px solid var(--border); background:var(--surface-2);
    display:flex; align-items:center; justify-content:center;
    transition:.15s; font-size:15px; color:transparent;
  }
  .check.checked{ background:var(--good); border-color:var(--good); color:#08130f; }
  .task-info{ flex:1; min-width:0; }
  .task-name{ font-weight:700; font-size:14.5px; }
  .task-name.checked-text{ color:var(--text-dim); text-decoration:line-through; text-decoration-color:var(--text-dimmer); }
  .task-goal{ font-size:12px; color:var(--text-dimmer); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .empty-state{
    text-align:center; padding:40px 16px; color:var(--text-dimmer);
  }
  .empty-state .e-icon{ font-size:34px; margin-bottom:10px; }
  .empty-state .e-title{ color:var(--text-dim); font-weight:700; margin-bottom:4px; font-size:14px; }

  /* ---------- Buttons ---------- */
  .btn{
    border:none; border-radius:14px; padding:13px 18px; font-weight:700; font-size:14px;
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  }
  .btn-accent{ background:linear-gradient(135deg, var(--accent), #d99a2b); color:#211603; }
  .btn-ghost{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
  .btn-danger-ghost{ background:var(--bad-dim); color:var(--bad); }
  .btn-sm{ width:auto; padding:8px 14px; font-size:12.5px; border-radius:10px; }

  /* ---------- Textarea note ---------- */
  textarea.note{
    width:100%; min-height:100px; resize:vertical;
    background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-md);
    color:var(--text); padding:12px 14px; font-size:13.5px; line-height:1.9;
  }
  textarea.note:focus, input:focus{ outline:2px solid var(--accent-dim); }

  /* ---------- Week grid ---------- */
  .week-table{ width:100%; border-collapse:separate; border-spacing:0; }
  .week-table th{ font-size:11px; color:var(--text-dimmer); font-weight:600; padding-bottom:8px; }
  .week-table td{ text-align:center; padding:6px 2px; }
  .week-habit-name{ text-align:right; font-size:12.5px; font-weight:700; padding:8px 4px; max-width:90px; }
  .wcell{
    width:24px; height:24px; border-radius:7px; margin:0 auto;
    display:flex; align-items:center; justify-content:center; font-size:12px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dimmer);
  }
  .wcell.done{ background:var(--good-dim); color:var(--good); border-color:transparent; }
  .wcell.missed{ background:var(--bad-dim); color:var(--bad); border-color:transparent; }
  .wcell.future{ opacity:.3; }
  .wcell.planned{ background:var(--accent-dim); color:var(--accent); border-color:transparent; }
  .wcell.upcoming{ opacity:.5; border-style:dashed; }
  .week-pct{ font-weight:800; font-size:13px; }

  .best-worst{ display:flex; flex-direction:column; gap:10px; }
  .bw-item{ display:flex; align-items:center; justify-content:space-between; background:var(--surface-2); border-radius:var(--radius-sm); padding:10px 12px; }
  .bw-item .name{ font-size:13px; font-weight:700; }
  .bw-item .note{ font-size:11px; color:var(--text-dimmer); margin-top:2px; }

  /* ---------- Month heatmap ---------- */
  .month-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .month-grid .wd{ text-align:center; font-size:10.5px; color:var(--text-dimmer); padding-bottom:4px; }
  .mcell{
    aspect-ratio:1; border-radius:9px; background:var(--surface-2); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-dim); position:relative;
  }
  .mcell.pad{ background:transparent; border:none; }
  .mcell.today{ box-shadow:0 0 0 2px var(--accent) inset; }
  .mcell[data-act="view-day-special"]{ cursor:pointer; }
  .mcell-dot{
    position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
    width:5px; height:5px; border-radius:50%; background:var(--accent);
  }
  .week-day-strip{ display:flex; gap:6px; margin-top:10px; }
  .wds-cell{
    flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:4px;
    background:var(--surface-2); border:1px solid var(--border); border-radius:11px; padding:8px 2px;
    font-size:11px; color:var(--text-dim); position:relative;
  }
  .wds-cell.today{ box-shadow:0 0 0 2px var(--accent) inset; }
  .wds-cell[data-act="view-day-special"]{ cursor:pointer; }
  .wds-cell .wds-dot{ width:5px; height:5px; border-radius:50%; background:var(--accent); }
  .day-special-item{ padding:10px 4px; border-bottom:1px solid var(--border); }
  .day-special-item:last-child{ border-bottom:none; }
  .day-special-item .t{ font-weight:700; font-size:14px; }
  .day-special-item .m{ font-size:12px; color:var(--text-dim); margin-top:3px; }

  .dotgrid{ display:flex; flex-wrap:wrap; gap:5px; margin:10px 0 4px; }
  .dot{ width:11px; height:11px; border-radius:3px; background:var(--surface-3); }
  .dot.done{ background:var(--good); }
  .dot.missed{ background:var(--bad); }
  .dot.future{ background:var(--surface-2); opacity:.5; }

  .progress-bar{ height:9px; border-radius:999px; background:var(--surface-3); overflow:hidden; margin:8px 0; }
  .progress-bar > div{ height:100%; border-radius:999px; background:linear-gradient(90deg, var(--good), #62e0b3); }

  .habit-card-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .habit-title{ font-weight:800; font-size:15px; }
  .habit-goal{ font-size:12.5px; color:var(--text-dim); margin-top:3px; }
  .habit-stats-line{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .goal-check-row{
    display:flex; align-items:center; gap:10px; margin-top:12px; padding-top:12px; border-top:1px dashed var(--border);
  }
  .goal-check-row label{ font-size:13px; font-weight:600; color:var(--text-dim); }
  .goal-check-row.achieved label{ color:var(--good); }

  .habit-actions{ display:flex; gap:8px; margin-top:10px; }

  .reward-row{ margin-top:12px; padding-top:12px; border-top:1px dashed var(--border); }
  .reward-row-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .reward-row-label{ font-size:13px; font-weight:700; color:var(--text-dim); }
  .reward-row-text{ font-size:13.5px; margin-bottom:10px; }
  .btn[disabled]{ opacity:.4; cursor:not-allowed; }

  /* ---------- Rewards ---------- */
  .reward-item{ display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--border); }
  .reward-item:last-child{ border-bottom:none; }
  .reward-text{ flex:1; font-size:13.5px; }
  .reward-text.done{ color:var(--text-dimmer); text-decoration:line-through; }
  .x-btn{ background:none; border:none; color:var(--text-dimmer); font-size:16px; padding:4px 6px; }
  .x-btn:hover{ color:var(--bad); }

  .add-inline{ display:flex; gap:8px; margin-bottom:14px; }
  .add-inline input{ flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:11px 14px; color:var(--text); font-size:13.5px; }

  /* ---------- Bottom / Top nav ---------- */
  .tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    display:flex; justify-content:center;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.55) 30%, rgba(0,0,0,.55));
    padding:0 0 max(10px, env(safe-area-inset-bottom)) 0;
  }
  .tabbar-inner{
    display:flex; gap:2px; background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:6px; margin:0 16px; width:100%; max-width:730px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
    overflow-x:auto; scrollbar-width:none;
  }
  .tabbar-inner::-webkit-scrollbar{ display:none; }
  .tab-btn{
    flex:1 0 auto; min-width:58px; background:none; border:none; color:var(--text-dimmer);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:9px 2px; border-radius:14px; font-size:9.5px; font-weight:700; transition:.15s;
    white-space:nowrap;
  }
  .tab-btn .ic{ font-size:17px; }
  .tab-btn.active{ background:var(--surface-3); color:var(--accent); }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(6,7,10,.72); backdrop-filter:blur(3px);
    display:flex; align-items:flex-end; justify-content:center; z-index:50;
  }
  .modal-overlay.hidden{ display:none; }
  .modal{
    background:var(--surface); border:1px solid var(--border); border-radius:22px 22px 0 0;
    width:100%; max-width:760px; padding:22px 20px 26px; max-height:88vh; overflow-y:auto;
    animation:slideUp .22s ease;
  }
  @keyframes slideUp{ from{ transform:translateY(30px); opacity:0;} to{ transform:none; opacity:1;} }
  .modal h2{ margin:0 0 16px; font-size:17px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; color:var(--text-dim); margin-bottom:6px; font-weight:600; }
  .field input{ width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; color:var(--text); font-size:14px; }
  .field select{ width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; color:var(--text); font-size:14px; }
  .field .hint{ font-size:11px; color:var(--text-dimmer); margin-top:5px; }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }

  /* ---------- Special plan (برنامه خاص) ---------- */
  .special-item{
    display:flex; align-items:flex-start; gap:12px;
    padding:13px 4px; border-bottom:1px solid var(--border);
  }
  .special-item:last-child{ border-bottom:none; }
  .special-info{ flex:1; min-width:0; }
  .special-title{ font-weight:700; font-size:14.5px; }
  .special-title.checked-text{ color:var(--text-dim); text-decoration:line-through; text-decoration-color:var(--text-dimmer); }
  .special-date{ font-size:12px; color:var(--text-dimmer); margin-top:3px; }
  .special-actions{ display:flex; gap:6px; margin-top:8px; }
  .time-badge{
    display:inline-flex; align-items:center; gap:4px; margin-top:6px;
    padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700;
    background:var(--surface-3); color:var(--text-dim);
  }
  .time-badge.near{ background:var(--accent-dim); color:var(--accent); animation:pulseNear 1.4s ease-in-out infinite; }
  .time-badge.passed{ background:var(--bad-dim); color:var(--bad); }
  @keyframes pulseNear{ 0%,100%{ opacity:1;} 50%{ opacity:.55;} }
  .special-item.near-highlight{ background:rgba(242,184,75,.06); border-radius:12px; }
  .field-row{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .field-row input[type="checkbox"]{ width:19px; height:19px; accent-color:var(--accent); }
  .goal-check-list{ display:flex; flex-direction:column; gap:9px; max-height:180px; overflow-y:auto; padding:2px; }
  .goal-check-list label{ display:flex; align-items:center; gap:9px; font-size:13.5px; font-weight:600; color:var(--text); }
  .goal-check-list input[type="checkbox"]{ width:19px; height:19px; min-width:19px; accent-color:var(--accent); }
  .goal-add-row{ display:flex; gap:8px; margin-top:10px; }
  .goal-add-row input{ flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 12px; color:var(--text); font-size:13px; }
  .field-row label{ font-size:13.5px; font-weight:600; color:var(--text); }
  .field input[type="date"], .field input[type="time"]{
    width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:12px;
    padding:12px 14px; color:var(--text); font-size:14px; direction:ltr; text-align:left;
  }

  /* ---------- Account tab ---------- */
  .account-card-head{ display:flex; align-items:center; justify-content:space-between; }
  .sub-days-num{ font-size:32px; font-weight:900; }
  .sub-days-num.low{ color:var(--bad); }
  .log-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
  .log-cell{ background:var(--surface-2); border-radius:var(--radius-sm); padding:12px; text-align:center; }
  .log-cell .num{ font-size:20px; font-weight:900; }
  .log-cell .lbl{ font-size:11px; color:var(--text-dimmer); margin-top:4px; }
  .logout-row{ margin-top:16px; }

  /* ---------- Lock screen (subscription expired) ---------- */
  .lock-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .lock-screen.hidden{ display:none; }
  .lock-box{
    width:100%; max-width:360px; text-align:center;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:30px 22px; box-shadow:var(--shadow);
  }
  .lock-icon{ font-size:34px; margin-bottom:10px; }
  .lock-msg-btn{
    width:100%; border:none; border-radius:14px; padding:14px 16px; font-weight:700; font-size:13.5px;
    background:var(--bad-dim); color:var(--bad); margin-bottom:12px; line-height:1.9; cursor:default;
  }

  @media (min-width:768px){
    .app{ padding-bottom:26px; }
    .tabbar{ position:sticky; top:0; background:none; padding:0; order:-1; }
    .app{ display:flex; flex-direction:column; }
    .topbar{ order:0; }
    .tabbar{ order:1; margin-bottom:6px; }
    main{ order:2; }
    .tabbar-inner{ box-shadow:none; margin:0 0 10px; }
    .modal-overlay{ align-items:center; }
    .modal{ border-radius:22px; max-width:520px; }
  }
</style>
</head>
<body>
<div class="app hidden" id="appRoot">

  <header class="topbar">
    <div>
      <div class="brand-title">پلنر شخصی</div>
      <div class="brand-date" id="headerDate">—</div>
    </div>
    <div style="display:flex;gap:8px;">

<script>
(function(){
  "use strict";

  /* ============================= Supabase / Cloud Storage ============================= */
  var SUPABASE_URL = "https://suhlfgqicetqktwcymqa.supabase.co";
  var SUPABASE_KEY = "sb_publishable_R-49m_1Ay9TLaJ8swZfRag_AYn5ktff";
  if (typeof supabase === "undefined"){
    console.error("[boot] supabase-js SDK did not load from CDN — check internet connection / filtering / ad-block.");
    document.getElementById("authError").textContent = "اتصال به سرویس ابری برقرار نشد (ممکن است فیلترشکن لازم باشد). صفحه را رفرش کنید.";
    document.getElementById("loginBtn").disabled = true;
    return;
  }
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var TABLE = "planner_data";
  var currentUser = null;
  // Nothing is ever written to Supabase until this becomes true (set only after
  // fetchState has successfully loaded — or legitimately created — this user's row).
  // This is what actually protects existing data: if a load ever fails partway
  // (bad connection, server hiccup, a bug in a future update, etc.) the app simply
  // cannot save over it with an empty/incomplete local state.
  var stateLoaded = false;

  var TRIAL_DAYS = 36500; // ~100 years — accounts are limited to the pre-created admins, so "unlimited" in practice
  var RENEW_DAYS = 36500;

  function defaultState(){
    return {
      habits: [],
      rewards: [],
      notes: {},
      specialPlans: [],
      goals: [],
      account: { subscriptionEnd: addDaysISO(todayISO(), TRIAL_DAYS), username: null }
    };
  }

  // Shows a visible on-screen warning when a save to Supabase fails, so failures
  // (missing RLS policy, missing unique constraint, network issue, etc.) are never
  // silently invisible — previously these only went to console.error and looked
  // like "delete/edit came back after refresh" with no clue why.
  function showSaveError(err){
    console.error("save error", err);
    var el = document.getElementById("saveErrorToast");
    if(!el){
      el = document.createElement("div");
      el.id = "saveErrorToast";
      el.style.cssText = "position:fixed;bottom:100px;left:16px;right:16px;max-width:520px;margin:0 auto;background:#4a2321;color:#f0605a;border:1px solid #f0605a;border-radius:14px;padding:12px 16px;font-size:12.5px;line-height:1.7;z-index:200;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.4);";
      document.body.appendChild(el);
    }
    el.textContent = "❌ ذخیره‌سازی ناموفق بود — این تغییر با رفرش از بین می‌رود. خطا: " + (err && err.message ? err.message : "نامشخص");
    el.style.display = "block";
    clearTimeout(showSaveError._t);
    showSaveError._t = setTimeout(function(){ el.style.display = "none"; }, 7000);
  }

  // Writes the whole state to Supabase right away. Used for every structural change
  // (add/edit/delete/toggle) so that refreshing immediately after an action can never
  // race ahead of the save (this was the cause of edits/deletes "coming back" on refresh).
  function doSave(){
    if(!currentUser || !stateLoaded) return null;
    return sb.from(TABLE).upsert({
      user_id: currentUser.id,
      data: state,
      updated_at: new Date().toISOString()
    }, { onConflict: "user_id" }).then(function(res){
      if(res.error) showSaveError(res.error);
    }).catch(function(err){ showSaveError(err); });
  }
  function saveState(){
    doSave();
  }
  // Debounced save — only for the note textarea, so typing doesn't fire a network
  // request per keystroke. Flushed immediately on page unload as a safety net.
  var noteSaveTimer = null;
  function saveNoteDebounced(){
    clearTimeout(noteSaveTimer);
    noteSaveTimer = setTimeout(function(){ noteSaveTimer = null; doSave(); }, 500);
  }
  window.addEventListener("beforeunload", function(){
    if (noteSaveTimer){ clearTimeout(noteSaveTimer); noteSaveTimer = null; doSave(); }
  });

  // Loads (or creates) this user's row from Supabase and populates the existing
  // `state` object in place, so every closure that already captured `state` still
  // points at the right data.
  function fetchState(){
    stateLoaded = false;
    return sb.from(TABLE).select("data").eq("user_id", currentUser.id).maybeSingle()
      .then(function(res){
        if(res.error){ showSaveError(res.error); throw res.error; }
        var loaded = (res.data && res.data.data) ? res.data.data : null;
        if(!loaded){
          loaded = defaultState();
          return sb.from(TABLE).insert({ user_id: currentUser.id, data: loaded }).then(function(insRes){
            if(insRes.error){ showSaveError(insRes.error); throw insRes.error; }
            applyState(loaded);
            stateLoaded = true;
          });
        }
        if(!loaded.habits) loaded.habits = [];
        if(!loaded.rewards) loaded.rewards = [];
        if(!loaded.notes) loaded.notes = {};
        if(!loaded.specialPlans) loaded.specialPlans = [];
        if(!loaded.goals) loaded.goals = [];
        if(!loaded.account) loaded.account = { subscriptionEnd: addDaysISO(todayISO(), TRIAL_DAYS), username: null };
        if(!loaded.account.subscriptionEnd) loaded.account.subscriptionEnd = addDaysISO(todayISO(), TRIAL_DAYS);
        if(loaded.account.username === undefined) loaded.account.username = null;

        // Migrate to goalIds[] (a habit can now have multiple goals, or none):
        // - very old free-text habit.goal -> matched/created goal record
        // - previous single habit.goalId -> goalIds:[goalId]
        // No duplicate goal records are created: matching is done by title.
        var migrated = false;
        loaded.habits.forEach(function(h){
          if(h.goalIds === undefined) h.goalIds = [];
          if(h.goal){
            var title = String(h.goal).trim();
            if(title){
              var match = loaded.goals.find(function(g){ return g.title === title; });
              if(!match){
                match = { id: uid(), title: title, targetDate: null, createdAt: todayISO() };
                loaded.goals.push(match);
              }
              if(h.goalIds.indexOf(match.id) === -1) h.goalIds.push(match.id);
              migrated = true;
            }
          }
          if(h.goal !== undefined){ delete h.goal; migrated = true; }
          if(h.goalId){
            if(h.goalIds.indexOf(h.goalId) === -1) h.goalIds.push(h.goalId);
            migrated = true;
          }
          if(h.goalId !== undefined){ delete h.goalId; migrated = true; }
        });

        applyState(loaded);
        stateLoaded = true;
        if(migrated) doSave();
      });
  }

  function applyState(loaded){
    state.habits = loaded.habits;
    state.rewards = loaded.rewards;
    state.notes = loaded.notes;
    state.specialPlans = loaded.specialPlans;
    state.goals = loaded.goals;
    state.account = loaded.account;
  }

  var state = defaultState();

  /* ============================= Auth ============================= */
  var authScreen = document.getElementById("authScreen");
  var appRoot = document.getElementById("appRoot");
  var authUsername = document.getElementById("authUsername");
  var authPassword = document.getElementById("authPassword");
  var authError = document.getElementById("authError");
  var authSub = document.getElementById("authSub");

  function showApp(){
    authScreen.classList.add("hidden");
    appRoot.classList.remove("hidden");
  }

  /* ============================= Subscription ============================= */
  function daysRemaining(){
    if(!state.account || !state.account.subscriptionEnd) return 0;
    return diffDaysISO(todayISO(), state.account.subscriptionEnd);
  }
  function isSubscriptionExpired(){
    return daysRemaining() < 0;
  }
  function checkLockState(){
    var lockScreen = document.getElementById("lockScreen");
    var expired = isSubscriptionExpired();
    lockScreen.classList.toggle("hidden", !expired);
    appRoot.classList.toggle("hidden", expired);
  }
  function renewSubscription(){
    // TODO: در آینده به‌جای تمدید محلی، کاربر باید به درگاه پرداخت واقعی (مثلاً زرین‌پال)
    // هدایت بشه و بعد از تأیید پرداخت، این تاریخ سمت سرور (نه کلاینت) آپدیت بشه.
    var base = isSubscriptionExpired() ? todayISO() : state.account.subscriptionEnd;
    state.account.subscriptionEnd = addDaysISO(base, RENEW_DAYS);
    saveState();
    checkLockState();
    renderAll();
  }
  function showAuth(msg){
    appRoot.classList.add("hidden");
    document.getElementById("lockScreen").classList.add("hidden");
    authScreen.classList.remove("hidden");
    authError.textContent = msg || "";
  }
  function setAuthBusy(busy){
    document.getElementById("loginBtn").disabled = busy;
    authSub.textContent = busy ? "در حال ارتباط..." : "برای استفاده وارد حساب خودت شو";
  }

  // Usernames aren't a native Supabase Auth concept, so we keep a small public-readable
  // mapping table (admin_usernames: username -> email) and sign in with the email behind
  // the scenes. There is no sign-up flow — only the pre-created admin accounts can log in.
  document.getElementById("loginBtn").addEventListener("click", function(){
    var username = authUsername.value.trim(), pass = authPassword.value;
    if(!username || !pass){ authError.textContent = "نام کاربری و رمز عبور رو وارد کن"; return; }
    setAuthBusy(true);
    authError.textContent = "";
    sb.from("admin_usernames").select("email").eq("username", username).maybeSingle().then(function(res){
      if(res.error){
        console.error("[login] admin_usernames lookup failed:", res.error);
        setAuthBusy(false);
        authError.textContent = "خطای اتصال به سرور — جزئیات دقیق توی کنسول مرورگر (F12) هست";
        return;
      }
      if(!res.data){
        console.warn("[login] no admin_usernames row found for username:", username);
        setAuthBusy(false);
        authError.textContent = "نام کاربری یا رمز عبور اشتباه است";
        return;
      }
      sb.auth.signInWithPassword({ email: res.data.email, password: pass }).then(function(r){
        setAuthBusy(false);
        if(r.error){
          console.error("[login] signInWithPassword failed:", r.error);
          if(/invalid login credentials/i.test(r.error.message || "")){
            authError.textContent = "نام کاربری یا رمز عبور اشتباه است";
          } else {
            authError.textContent = "خطا: " + r.error.message + " (جزئیات بیشتر توی کنسول)";
          }
          return;
        }
        onAuthed(r.data.user, username);
      });
    });
  });

  function doLogout(){
    sb.auth.signOut().then(function(){
      currentUser = null;
      stateLoaded = false;
      state = defaultState();
      showAuth();
    });
  }

  function onAuthed(user, username){
    currentUser = user;
    fetchState().then(function(){
      if(username && state.account.username !== username){
        state.account.username = username;
        doSave();
      }
      showApp();
      checkLockState();
      renderAll();
      startTimeWatcher();
    }).catch(function(err){
      // Loading this user's data from Supabase failed partway through. Do NOT show
      // the app in this case — the in-memory `state` may still be an empty default,
      // and any action the person takes would call saveState() and overwrite their
      // real cloud data with that empty state. Instead, sign out and send them back
      // to the login screen so a retry starts clean.
      stateLoaded = false;
      sb.auth.signOut().finally(function(){
        currentUser = null;
        showAuth("بارگذاری اطلاعات از سرور ناموفق بود — اتصال اینترنت را بررسی کن و دوباره وارد شو. (چیزی از داده‌هات پاک نشده) خطا: " + (err && err.message ? err.message : "نامشخص"));
      });
    });
  }

  sb.auth.getSession().then(function(res){
    var session = res.data && res.data.session;
    if(session && session.user){
      onAuthed(session.user);
    } else {
      showAuth();
    }
  });

  /* ============================= Date helpers ============================= */
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function toISO(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function todayISO(){ return toISO(new Date()); }
  function isoToDate(iso){ var p = iso.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); }
  function addDaysISO(iso, n){ var d = isoToDate(iso); d.setDate(d.getDate()+n); return toISO(d); }
  function diffDaysISO(a,b){ return Math.round((isoToDate(b) - isoToDate(a)) / 86400000); }
  function isFuture(iso){ return diffDaysISO(todayISO(), iso) > 0; }

  var WEEKDAY_FA = ["یکشنبه","دوشنبه","سه‌شنبه","چهارشنبه","پنجشنبه","جمعه","شنبه"]; // JS getDay: 0..6
  var WEEKDAY_FA_SHORT = ["ی","د","س","چ","پ","ج","ش"];
  // Order starting Saturday for week view: Sat, Sun, Mon, Tue, Wed, Thu, Fri
  var WEEK_ORDER = [6,0,1,2,3,4,5];

  function weekdayName(iso){ return WEEKDAY_FA[isoToDate(iso).getDay()]; }

  /* Gregorian -> Jalali conversion (standard public-domain algorithm) */
  function gregorianToJalali(gy, gm, gd){
    var g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
    var jy;
    gy = parseInt(gy,10); gm = parseInt(gm,10); gd = parseInt(gd,10);
    jy = (gy <= 1600) ? 0 : 979;
    gy -= (gy <= 1600) ? 621 : 1600;
    var gy2 = (gm > 2) ? (gy + 1) : gy;
    var days = (365*gy) + parseInt((gy2+3)/4,10) - parseInt((gy2+99)/100,10) + parseInt((gy2+399)/400,10) - 80 + gd + g_d_m[gm-1];
    jy += 33 * parseInt(days/12053,10);
    days %= 12053;
    jy += 4 * parseInt(days/1461,10);
    days %= 1461;
    if (days > 365){
      jy += parseInt((days-1)/365,10);
      days = (days-1) % 365;
    }
    var jm = (days < 186) ? 1 + parseInt(days/31,10) : 7 + parseInt((days-186)/30,10);
    var jd = 1 + ((days < 186) ? (days % 31) : ((days-186) % 30));
    return [jy, jm, jd];
  }
  /* Jalali -> Gregorian conversion (inverse of the above, standard public-domain algorithm) */
  function jalaliToGregorian(jy, jm, jd){
    jy = parseInt(jy,10); jm = parseInt(jm,10); jd = parseInt(jd,10);
    var gy;
    jy += 1595;
    var days = -355668 + (365*jy) + (parseInt(jy/33,10)*8) + parseInt(((jy%33)+3)/4,10) + jd + ((jm<7) ? (jm-1)*31 : ((jm-7)*30)+186);
    gy = 400 * parseInt(days/146097,10);
    days %= 146097;
    if (days > 36524){
      gy += 100 * parseInt(--days/36524,10);
      days %= 36524;
      if (days >= 365) days++;
    }
    gy += 4 * parseInt(days/1461,10);
    days %= 1461;
    if (days > 365){
      gy += parseInt((days-1)/365,10);
      days = (days-1) % 365;
    }
    var gd = days + 1;
    var sal_a = [0,31,(((gy%4===0)&&(gy%100!==0))||(gy%400===0))?29:28,31,30,31,30,31,31,30,31,30,31];
    var gm;
    for (gm=1; gm<=12; gm++){
      if (gd <= sal_a[gm]) break;
      gd -= sal_a[gm];
    }
    return [gy, gm, gd];
  }
  function isLeapJalaliYear(jy){
    var breaks = [1,5,9,13,17,22,26,30];
    var r = ((jy % 33) + 33) % 33;
    for (var i=0;i<breaks.length;i++){ if (r === breaks[i]) return true; }
    return false;
  }
  function jalaliMonthLength(jy, jm){
    if (jm <= 6) return 31;
    if (jm <= 11) return 30;
    return isLeapJalaliYear(jy) ? 30 : 29;
  }
  function jalaliToISO(jy, jm, jd){
    var g = jalaliToGregorian(jy, jm, jd);
    return toISO(new Date(g[0], g[1]-1, g[2]));
  }
  var JMONTHS = ["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
  var FA_DIGITS = ["۰","۱","۲","۳","۴","۵","۶","۷","۸","۹"];
  function faNum(n){ return String(n).replace(/[0-9]/g, function(d){ return FA_DIGITS[+d]; }); }
  function jalaliOf(iso){
    var d = isoToDate(iso);
    var j = gregorianToJalali(d.getFullYear(), d.getMonth()+1, d.getDate());
    return { y:j[0], m:j[1], d:j[2] };
  }
  function jalaliLongDate(iso){
    var j = jalaliOf(iso);
    return weekdayName(iso) + "، " + faNum(j.d) + " " + JMONTHS[j.m-1] + " " + faNum(j.y);
  }
  function jalaliShort(iso){
    var j = jalaliOf(iso);
    return faNum(j.d) + " " + JMONTHS[j.m-1];
  }

  function uid(){ return "id_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8); }
  function escapeHtml(s){
    return (s==null?"":String(s)).replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
    });
  }
  function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

  /* ============================= Habit computations ============================= */
  // A habit is "applicable" (shown/toggleable) on any date from its startDate onward,
  // including future dates in the current month/week — so newly added habits show
  // everywhere right away instead of waiting for "today" to reach that date.
  function isApplicable(habit, iso){
    return diffDaysISO(habit.startDate, iso) >= 0;
  }
  // A day only "counts" toward stats/percentages once it has actually happened.
  function isCountable(habit, iso){
    return isApplicable(habit, iso) && !isFuture(iso);
  }
  function isDone(habit, iso){ return !!habit.completions[iso]; }

  function habitStats(habit){
    var elapsed = diffDaysISO(habit.startDate, todayISO()) + 1;
    if (elapsed < 1) elapsed = 1;
    var completed = 0;
    for (var iso in habit.completions){
      if (habit.completions[iso] && diffDaysISO(habit.startDate, iso) >= 0 && diffDaysISO(iso, todayISO()) >= 0){
        completed++;
      }
    }
    var target = habit.targetDays || 30;
    var progressPct = clamp(Math.round((completed / target) * 100), 0, 100);
    var missed = Math.max(elapsed - completed, 0);
    var negativePct = clamp(Math.round((missed / elapsed) * 100), 0, 100);
    return { elapsed: elapsed, completed: completed, target: target, progressPct: progressPct, negativePct: negativePct, missed: missed };
  }

  /* ============================= Goal computations ============================= */
  function habitGoalTitles(h){
    return (h.goalIds||[]).map(function(id){
      var g = state.goals.find(function(x){ return x.id===id; });
      return g ? g.title : null;
    }).filter(function(t){ return !!t; });
  }
  // Aggregates progress across every habit linked to a goal: sums each habit's
  // completed days over its target days, so the goal's bar reflects combined
  // progress of all programs tied to it (not just a single habit). A habit with
  // several goals contributes to each of those goals' progress.
  function goalStats(goal){
    var linked = state.habits.filter(function(h){ return (h.goalIds||[]).indexOf(goal.id) !== -1; });
    var sumCompleted = 0, sumTarget = 0, achievedCount = 0;
    linked.forEach(function(h){
      var st = habitStats(h);
      sumCompleted += st.completed;
      sumTarget += st.target;
      if (h.goalAchieved) achievedCount++;
    });
    var pct = sumTarget ? clamp(Math.round((sumCompleted/sumTarget)*100), 0, 100) : 0;
    return { linked: linked, pct: pct, achievedCount: achievedCount, total: linked.length };
  }

  function habitWeekStats(habit, weekDates){
    var countableDates = weekDates.filter(function(iso){ return isCountable(habit, iso); });
    var doneCount = countableDates.filter(function(iso){ return isDone(habit, iso); }).length;
    var pct = countableDates.length ? Math.round((doneCount/countableDates.length)*100) : null;
    var missedNames = countableDates.filter(function(iso){ return !isDone(habit, iso); }).map(weekdayName);
    return { applicable: countableDates.length, done: doneCount, pct: pct, missedNames: missedNames };
  }

  /* ============================= Navigation state ============================= */
  var currentTab = "today";
  var viewedDayISO = todayISO();
  var weekOffset = 0;   // 0 = current week
  var monthOffset = 0;  // 0 = current month

  function currentWeekDates(){
    var base = new Date();
    base.setDate(base.getDate() + weekOffset*7);
    var jsDay = base.getDay(); // 0..6, week starts Saturday(6)
    var deltaToSaturday = (jsDay - 6 + 7) % 7;
    var saturday = new Date(base);
    saturday.setDate(base.getDate() - deltaToSaturday);
    var dates = [];
    for (var i=0;i<7;i++){
      var d = new Date(saturday); d.setDate(saturday.getDate()+i);
      dates.push(toISO(d));
    }
    return dates;
  }

  function currentJalaliMonthInfo(){
    var j = jalaliOf(todayISO());
    var totalMonths = (j.y*12 + (j.m-1)) + monthOffset;
    var jy = Math.floor(totalMonths/12);
    var jm = (((totalMonths%12)+12)%12) + 1;
    var daysInMonth = jalaliMonthLength(jy, jm);
    var firstISO = jalaliToISO(jy, jm, 1);
    var firstWeekday = isoToDate(firstISO).getDay(); // 0..6, Saturday=6
    return { jy:jy, jm:jm, daysInMonth:daysInMonth, firstISO:firstISO, firstWeekday:firstWeekday };
  }

  function sortedSpecialPlans(){
    return state.specialPlans.slice().sort(function(a,b){
      var da = a.date + (a.timeEnabled && a.time ? " "+a.time : " 00:00");
      var db = b.date + (b.timeEnabled && b.time ? " "+b.time : " 00:00");
      return da < db ? -1 : (da > db ? 1 : 0);
    });
  }

  // Returns: null (no time set), "near" (within 30 min before/at target), "passed" (time already gone), "future" (more than 30 min away)
  function planTimeStatus(plan){
    if (!plan.timeEnabled || !plan.time || plan.date !== todayISO()) return null;
    var now = new Date();
    var parts = plan.time.split(":");
    var target = new Date();
    target.setHours(parseInt(parts[0],10), parseInt(parts[1],10), 0, 0);
    var diffMin = (target - now) / 60000;
    if (diffMin < -1) return "passed";
    if (diffMin <= 30) return "near";
    return "future";
  }

  function planTimeBadge(plan){
    if (!plan.timeEnabled || !plan.time) return "";
    var status = planTimeStatus(plan);
    var cls = status === "near" ? "near" : (status === "passed" ? "passed" : "");
    var label = plan.time.replace(":", ":");
    var extra = status === "near" ? " ⏰ نزدیکه" : (status === "passed" ? " · گذشت" : "");
    return '<span class="time-badge '+cls+'">🕒 '+label+extra+'</span>';
  }

  function startTimeWatcher(){
    setInterval(function(){
      var needsRerender = false;

        var status = planTimeStatus(p);
        if (status === "near" && !notifiedIds[p.id]){

          needsRerender = true;

            try { new Notification("یادآوری برنامه", { body: p.title + " — ساعت " + p.time }); } catch(e){}

    });

    weekResults.forEach(function(r){ totalApplicable += r.stats.applicable; totalDone += r.stats.done; });
    var overallPct = totalApplicable ? Math.round((totalDone/totalApplicable)*100) : 0;

    var withPct = weekResults.filter(function(r){ return r.stats.pct!==null; });
    var sorted = withPct.slice().sort(function(a,b){ return b.stats.pct - a.stats.pct; });
    var best = sorted.slice(0, Math.min(3, sorted.length)).filter(function(r){ return r.stats.pct >= 70; });
    var worst = sorted.slice().reverse().slice(0, Math.min(3, sorted.length)).filter(function(r){ return r.stats.pct < 70; });

  /* ---------- MONTH ---------- */
  function renderMonth(){
    var el = document.getElementById("panel-month");
    var info = currentJalaliMonthInfo();

    var dayCells = [];
    var leadingBlanks = (info.firstWeekday - 6 + 7) % 7;
    for (var i=0;i<leadingBlanks;i++) dayCells.push(null);
    for (var d=1; d<=info.daysInMonth; d++){
      dayCells.push(jalaliToISO(info.jy, info.jm, d));
    }

    function dayCompletion(iso){
      var applicable = state.habits.filter(function(h){ return isApplicable(h, iso); });
      if (!applicable.length) return null;
      var done = applicable.filter(function(h){ return isDone(h, iso); }).length;
      return done/applicable.length;
    }
    function dayHasSpecial(iso){
      return state.specialPlans.some(function(p){ return p.date === iso; });
    }

    var html = "";
    html += '<div class="nav-switch">';
    html += '  <button class="chev" data-act="month-prev">‹</button>';
    html += '  <div class="mid"><div class="big">'+JMONTHS[info.jm-1]+' '+faNum(info.jy)+'</div><div class="small">'+(monthOffset===0?'این ماه':(monthOffset<0?'ماه گذشته':'ماه آینده'))+'</div></div>';
    html += '  <button class="chev" data-act="month-next">›</button>';
    html += '</div>';

    html += '<div class="card"><h3>نمای کلی ماه</h3><div class="month-grid">';
    // header order matches WEEK_ORDER (sat..fri)
    var headOrder = [6,0,1,2,3,4,5];
    headOrder.forEach(function(dow){ html += '<div class="wd">'+WEEKDAY_FA_SHORT[dow]+'</div>'; });
    dayCells.forEach(function(iso){
      if (iso===null){ html += '<div class="mcell pad"></div>'; return; }
      var comp = dayCompletion(iso);
      var future = isFuture(iso);
      var bg = "var(--surface-2)";
      if (comp !== null){
        if (future){
          bg = comp > 0 ? "rgba(242,184,75,.30)" : "var(--surface-2)";
        } else if (comp >= 0.99) bg = "var(--good)";
        else if (comp >= 0.5) bg = "rgba(62,207,155,.45)";
        else if (comp > 0) bg = "rgba(240,96,90,.35)";
        else bg = "var(--bad-dim)";
      }
      var isToday = iso===todayISO();
      var dnum = jalaliOf(iso).d;
      var hasSpecial = dayHasSpecial(iso);
      html += '<div class="mcell '+(isToday?'today':'')+'" style="background:'+bg+';" '+(hasSpecial?'data-act="view-day-special" data-date="'+iso+'"':'')+' title="'+jalaliShort(iso)+'">'+faNum(dnum);
      if (hasSpecial) html += '<span class="mcell-dot"></span>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div class="dimmer" style="margin-top:12px;">رنگ سبز = روزهای پرانجام، رنگ قرمز = روزهای ضعیف عملکرد · نقطه‌ی زرد = برنامه خاص دارد</div>';
    html += '</div>';

    if (!state.habits.length){
      html += '<div class="card"><div class="empty-state"><div class="e-icon">▦</div><div class="e-title">هنوز برنامه‌ای برای پیگیری ماهانه نداری</div></div></div>';
    } else {
      state.habits.forEach(function(h){
        var st = habitStats(h);
        var dots = "";
        for (var day=1; day<=st.target; day++){
          var iso = addDaysISO(h.startDate, day-1);
          var cls = "future";
          if (!isFuture(iso)){
            cls = isDone(h, iso) ? "done" : "missed";
          }
          dots += '<div class="dot '+cls+'" title="'+jalaliShort(iso)+'"></div>';
        }
        html += '<div class="card">';
        html += '  <div class="habit-card-head"><div><div class="habit-title">'+escapeHtml(h.name)+'</div>';
        var gTitles2 = habitGoalTitles(h);
        if (gTitles2.length) html += '<div class="habit-goal">🎯 '+escapeHtml(gTitles2.join('، '))+'</div>';
        html += '  </div>'+(h.goalAchieved? '<span class="pill good">هدف محقق شد</span>':'')+'</div>';
        html += '  <div class="dotgrid">'+dots+'</div>';
        html += '  <div class="progress-bar"><div style="width:'+st.progressPct+'%;"></div></div>';
        html += '  <div class="habit-stats-line">';
        html += '    <span class="pill accent">پیشرفت هدف '+faNum(st.progressPct)+'٪</span>';
        html += '    <span class="pill '+(st.negativePct>30?'bad':'neutral')+'">افت عملکرد '+faNum(st.negativePct)+'٪</span>';
        html += '    <span class="pill neutral">'+faNum(st.completed)+' از '+faNum(st.target)+' روز</span>';
        html += '  </div>';
        html += '  <div class="goal-check-row '+(h.goalAchieved?'achieved':'')+'">';
        html += '    <button class="check '+(h.goalAchieved?'checked':'')+'" data-act="toggle-goal" data-id="'+h.id+'">'+(h.goalAchieved?'✓':'')+'</button>';
        html += '    <label>هدف این برنامه رو محقق کردم</label>';
        html += '  </div>';

        var linkedReward = h.rewardId ? state.rewards.find(function(rw){ return rw.id===h.rewardId; }) : null;
        html += '  <div class="reward-row">';
        html += '    <div class="reward-row-top"><span class="reward-row-label">🎁 پاداش برنامه</span>'+(linkedReward && linkedReward.done ? '<span class="pill good">فعال شده</span>' : '')+'</div>';
        if (linkedReward){
          html += '    <div class="reward-row-text">'+escapeHtml(linkedReward.text)+'</div>';
          var rewardDisabled = (!h.goalAchieved || linkedReward.done);
          html += '    <button class="btn '+(linkedReward.done? 'btn-ghost':'btn-accent')+' btn-sm" data-act="activate-reward" data-id="'+linkedReward.id+'" '+(rewardDisabled?'disabled':'')+'>'+(linkedReward.done? '✓ فعال شده' : 'فعال‌سازی پاداش')+'</button>';
        } else {
          html += '    <div class="dimmer">برای این برنامه پاداشی انتخاب نکردی — از ویرایش برنامه (تب برنامه‌ها) یکی انتخاب کن</div>';
        }
        html += '  </div>';
        html += '</div>';
      });
    }

    el.innerHTML = html;
  }

  /* ---------- GOALS ---------- */
  function sortedGoals(){
    return state.goals.slice().sort(function(a,b){
      if(a.targetDate && b.targetDate) return a.targetDate < b.targetDate ? -1 : (a.targetDate > b.targetDate ? 1 : 0);
      if(a.targetDate) return -1;
      if(b.targetDate) return 1;
      return 0;
    });
  }

      var m = parseInt(document.getElementById("mGoalMonth").value, 10);

      var currentDay = parseInt(daySelect.value, 10) || 1;

  function saveGoalFromModal(existingId){
    var title = document.getElementById("mGoalTitle").value.trim();
    if (!title){ document.getElementById("mGoalTitle").focus(); return; }
    var dateEnabled = document.getElementById("mGoalDateEnabled").checked;
    var targetDate = null;
    if (dateEnabled){
      var day = parseInt(document.getElementById("mGoalDay").value, 10);
      var month = parseInt(document.getElementById("mGoalMonth").value, 10);
      var year = parseInt(document.getElementById("mGoalYear").value, 10);
      if (!year || year < 1200 || year > 1600 || !month || !day){ document.getElementById("mGoalYear").focus(); return; }
      targetDate = jalaliToISO(year, month, day);
    }

    if (existingId){
      var g = state.goals.find(function(x){ return x.id===existingId; });
      if (g){ g.title = title; g.targetDate = targetDate; }
    } else {
      state.goals.push({ id: uid(), title: title, targetDate: targetDate, createdAt: todayISO() });
    }
    saveState();
    closeModal();
    renderAll();
  }

  function deleteGoal(id){
    state.goals = state.goals.filter(function(x){ return x.id!==id; });
    state.habits.forEach(function(h){
      if (h.goalIds){
        var idx = h.goalIds.indexOf(id);
        if (idx !== -1) h.goalIds.splice(idx, 1);
      }
    });
    saveState();
    renderAll();
  }

      html += '<div class="hint">وقتی هدف این برنامه رو تیک بزنی، می‌تونی این پاداش رو از تب ماهانه فعال کنی.</div>';
    } else {
      html += '<div class="hint">هنوز پاداشی نساختی — اول از تب «پاداش» یکی اضافه کن، بعد اینجا انتخابش کن.</div>';
    }
    html += '</div>';
    html += '<div class="modal-actions">';
    html += '  <button class="btn btn-ghost" data-act="close-modal">انصراف</button>';
    html += '  <button class="btn btn-accent" data-act="save-habit" data-id="'+(existing? existing.id : "")+'">ذخیره</button>';
    html += '</div>';

    body.innerHTML = html;
    overlay.classList.remove("hidden");

    var addGoalBtn = document.getElementById("mHabitAddGoalBtn");
    var newGoalTitleInput = document.getElementById("mHabitNewGoalTitle");
    var goalsListEl = document.getElementById("mHabitGoalsList");
    if (addGoalBtn){
      addGoalBtn.addEventListener("click", function(){
        var t = newGoalTitleInput.value.trim();
        if (!t) return;
        var g = state.goals.find(function(x){ return x.title === t; });
        var isNew = false;
        if (!g){
          g = { id: uid(), title: t, targetDate: null, createdAt: todayISO() };
          state.goals.push(g);
          isNew = true;
        }
        var already = goalsListEl.querySelector('input[value="'+g.id+'"]');
        if (already){
          already.checked = true;
        } else {
          var emptyHint = goalsListEl.querySelector(".dimmer");
          if (emptyHint) emptyHint.remove();
          var lbl = document.createElement("label");
          lbl.innerHTML = '<input type="checkbox" class="mHabitGoalCheckbox" value="'+g.id+'" checked>'+escapeHtml(g.title);
          goalsListEl.appendChild(lbl);
        }
        newGoalTitleInput.value = "";
        if (isNew) saveState();
      });
      newGoalTitleInput.addEventListener("keydown", function(e){
        if (e.key === "Enter"){ e.preventDefault(); addGoalBtn.click(); }
      });
    }
  }

  function closeModal(){
    document.getElementById("modalOverlay").classList.add("hidden");
  }

  function saveHabitFromModal(existingId){
    var name = document.getElementById("mHabitName").value.trim();
    var target = parseInt(document.getElementById("mHabitTarget").value, 10);
    var rewardSelect = document.getElementById("mHabitReward");
    var rewardId = rewardSelect ? (rewardSelect.value || null) : null;
    if (!name){ document.getElementById("mHabitName").focus(); return; }
    if (!target || target < 1) target = 30;

    // Collect every checked goal checkbox — a habit can be linked to any number
    // of goals (or none).
    var goalIds = [];
    document.querySelectorAll(".mHabitGoalCheckbox:checked").forEach(function(cb){ goalIds.push(cb.value); });

    // If the person typed a new goal title but never clicked "افزودن", pick it
    // up here too so it isn't silently lost.
    var pendingNewGoalTitle = document.getElementById("mHabitNewGoalTitle");
    if (pendingNewGoalTitle && pendingNewGoalTitle.value.trim()){
      var pendingTitle = pendingNewGoalTitle.value.trim();
      var pendingGoal = state.goals.find(function(g){ return g.title === pendingTitle; });
      if (!pendingGoal){
        pendingGoal = { id: uid(), title: pendingTitle, targetDate: null, createdAt: todayISO() };
        state.goals.push(pendingGoal);
      }
      if (goalIds.indexOf(pendingGoal.id) === -1) goalIds.push(pendingGoal.id);
    }

    if (existingId){
      var h = state.habits.find(function(x){ return x.id===existingId; });
      if (h){ h.name = name; h.goalIds = goalIds; h.targetDays = target; h.rewardId = rewardId; }
    } else {
      state.habits.push({
        id: uid(),
        name: name,
        goalIds: goalIds,
        targetDays: target,
        startDate: todayISO(),
        goalAchieved: false,
        rewardId: rewardId,
        completions: {}
      });
    }
    saveState();
    closeModal();
    renderAll();
  }

  /* ============================= Event delegation ============================= */
  document.addEventListener("click", function(e){
    var act = e.target.closest("[data-act]");
    if (!act) return;
    var action = act.getAttribute("data-act");
    var id = act.getAttribute("data-id");

    switch(action){
      case "toggle": {
        var h = state.habits.find(function(x){ return x.id===id; });
        if (h){
          h.completions[viewedDayISO] = !h.completions[viewedDayISO];
          if (!h.completions[viewedDayISO]) delete h.completions[viewedDayISO];
          saveState(); renderAll();
        }
        break;
      }
      case "toggle-goal": {
        var hb = state.habits.find(function(x){ return x.id===id; });
        if (hb){ hb.goalAchieved = !hb.goalAchieved; saveState(); renderAll(); }
        break;
      }
      case "today-prev": viewedDayISO = addDaysISO(viewedDayISO, -1); renderToday(); break;
      case "today-next": viewedDayISO = addDaysISO(viewedDayISO, 1); renderToday(); break;
      case "today-jump": viewedDayISO = todayISO(); renderToday(); break;
      case "week-prev": weekOffset--; renderWeek(); break;
      case "week-next": weekOffset++; renderWeek(); break;
      case "month-prev": monthOffset--; renderMonth(); break;
      case "month-next": monthOffset++; renderMonth(); break;
      case "open-add-habit": openHabitModal(null); break;
      case "edit-habit": openHabitModal(id); break;
      case "delete-habit": {
        if (confirm("این برنامه و کل سابقه‌اش حذف بشه؟")){
          state.habits = state.habits.filter(function(x){ return x.id!==id; });
          saveState(); renderAll();
        }
        break;
      }
      case "close-modal": closeModal(); break;
      case "save-habit": saveHabitFromModal(id || null); break;
      case "open-add-goal": openGoalModal(null); break;
      case "edit-goal": openGoalModal(id); break;
      case "save-goal": saveGoalFromModal(id || null); break;
      case "delete-goal": {
        if (confirm("این هدف حذف بشه؟ برنامه‌های وصل‌شده به این هدف، بدون هدف باقی می‌مانند.")){
          deleteGoal(id);
        }
        break;
      }
      case "add-reward": addReward(); break;
      case "activate-reward": {
        var rw = state.rewards.find(function(x){ return x.id===id; });
        if (rw && !rw.done){ rw.done = true; saveState(); renderAll(); }
        break;
      }
      case "toggle-reward": {
        var r = state.rewards.find(function(x){ return x.id===id; });
        if (r){ r.done = !r.done; saveState(); renderRewards(); }
        break;
      }
      case "delete-reward": {
        state.rewards = state.rewards.filter(function(x){ return x.id!==id; });
        saveState(); renderRewards();
        break;
      }
      case "open-add-special": openSpecialModal(null); break;
      case "edit-special": openSpecialModal(id); break;
      case "save-special": saveSpecialFromModal(id || null); break;
      case "delete-special": {
        if (confirm("این برنامه خاص حذف بشه؟")){
          state.specialPlans = state.specialPlans.filter(function(x){ return x.id!==id; });
          saveState(); renderAll();
        }
        break;
      }
      case "toggle-special": {
        var sp = state.specialPlans.find(function(x){ return x.id===id; });
        if (sp){ sp.done = !sp.done; saveState(); renderAll(); }
        break;
      }
      case "renew-subscription": renewSubscription(); break;
      case "logout": doLogout(); break;
      case "view-day-special": {
        var dateAttr = act.getAttribute("data-date");
        if (dateAttr) openDaySpecialModal(dateAttr);
        break;
      }
      case "open-account": {
        currentTab = "account";
        document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.toggle("active", b.getAttribute("data-tab")==="account"); });
        document.querySelectorAll(".tab-panel").forEach(function(p){ p.classList.remove("active"); });
        document.getElementById("panel-account").classList.add("active");
        break;
      }
    }
  });

  document.getElementById("modalOverlay").addEventListener("click", function(e){
    if (e.target.id === "modalOverlay") closeModal();
  });

  document.getElementById("resetBtn").addEventListener("click", function(){
    if (confirm("همه‌ی داده‌های پلنر (برنامه‌ها، برنامه‌های خاص، پاداش‌ها، یادداشت‌ها) برای همیشه پاک بشه؟")){
      state = defaultState();
      saveState();
      checkLockState();
      renderAll();
    }
  });

  /* ---------- Tabs ---------- */
  document.querySelectorAll(".tab-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      var tab = btn.getAttribute("data-tab");
      currentTab = tab;
      document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.toggle("active", b===btn); });
      document.querySelectorAll(".tab-panel").forEach(function(p){ p.classList.remove("active"); });
      document.getElementById("panel-"+tab).classList.add("active");
    });
  });

  /* ============================= Init ============================= */
  /* Rendering happens once auth resolves — see onAuthed() above. */

})();
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){});
    });
  }
</script>
</body>
</html>
